<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Training">
<meta name="theme-color" content="#ffffff">
<link rel="manifest" href="manifest.json">
<title>Petteri · Training</title>
<!-- v6 -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#ffffff;--bg2:#f7f7f7;--border:#efefef;
  --text:#1a1a1a;--text2:#888;--text3:#bbb;
  --orange:#fc4c02;--green:#22c55e;--amber:#f59e0b;--red:#ef4444;--purple:#a78bfa;
  --shadow:0 1px 8px rgba(0,0,0,0.07);
}
body.dark{
  --bg:#0f0f0f;--bg2:#1a1a1a;--border:#2a2a2a;
  --text:#e8e8e8;--text2:#888;--text3:#555;
  --shadow:0 1px 8px rgba(0,0,0,0.4);
}
body.dark .hdr{background:rgba(15,15,15,0.95)}
body.dark .nav{background:rgba(15,15,15,0.95);border-top-color:#2a2a2a}
body.dark .sport-pill{background:#cc3d00}
body.dark .act-footer{border-top-color:#2a2a2a}
body.dark .ai-card{background:#1a1a1a;border-color:#2a2a2a}
body.dark .str-card{background:#1a1a1a;border-color:#2a2a2a}
body.dark .ai-txt{color:#ccc}
body.dark .row-list-item{border-bottom-color:#2a2a2a}
body{
  font-family:-apple-system,'SF Pro Display','Inter',sans-serif;
  background:var(--bg);color:var(--text);
  padding-bottom:84px;max-width:430px;margin:0 auto;
  -webkit-font-smoothing:antialiased;
}

/* Header */
.hdr{
  padding:52px 16px 12px;background:rgba(255,255,255,0.95);
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  position:sticky;top:0;z-index:100;border-bottom:1px solid var(--border);
}
.hdr-row{display:flex;justify-content:space-between;align-items:center}
.hdr-title{font-size:1.1rem;font-weight:800;letter-spacing:-0.03em}
.hdr-sub{font-size:0.7rem;color:var(--text2);margin-top:2px}
.sync-btn{
  background:var(--orange);color:#fff;border:none;border-radius:10px;
  padding:7px 16px;font-size:0.78rem;font-weight:600;cursor:pointer;
  -webkit-appearance:none;
}

/* Bottom nav */
.nav{
  position:fixed;bottom:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:430px;
  background:rgba(255,255,255,0.95);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  border-top:1px solid var(--border);
  display:grid;grid-template-columns:repeat(4,1fr);
  padding:8px 0 20px;z-index:200;
}
.nav-btn{
  display:flex;flex-direction:column;align-items:center;gap:2px;
  padding:5px 4px;cursor:pointer;border:none;background:none;
  color:var(--text2);font-size:0.6rem;font-weight:500;transition:color 0.15s;
  -webkit-appearance:none;
}
.nav-btn.active{color:var(--orange)}
.nav-icon{font-size:1.25rem;line-height:1}

/* Tabs */
.tab{display:none}.tab.active{display:block}

/* Sections */
.sec{padding:16px 14px 0}
.sec-title{
  font-size:0.6rem;font-weight:700;text-transform:uppercase;
  letter-spacing:0.12em;color:var(--text2);margin-bottom:10px;
}

/* Cards */
.card{
  background:var(--bg);border:1px solid var(--border);
  border-radius:16px;overflow:hidden;box-shadow:var(--shadow);
  margin-bottom:12px;
}
.card-body{padding:14px 14px 10px}

/* Activity */
.act-sport-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.sport-pill{
  background:var(--orange);color:#fff;
  font-size:0.6rem;font-weight:700;text-transform:uppercase;
  letter-spacing:0.08em;padding:3px 10px;border-radius:999px;
}
.act-date{font-size:0.7rem;color:var(--text2)}
.act-name{font-size:1.1rem;font-weight:700;margin-bottom:8px;line-height:1.25}
.act-stats{font-size:0.8rem;color:var(--text2);line-height:1.7}

/* Map */
#actMap{height:220px;width:100%;background:var(--bg2)}

/* Activity footer */
.act-footer{
  padding:10px 14px;border-top:1px solid var(--border);
  display:flex;justify-content:space-between;align-items:center;
}
.act-footer a{color:var(--orange);font-size:0.75rem;font-weight:600;text-decoration:none}
.effort-pill{font-size:0.68rem;font-weight:600;padding:3px 10px;border-radius:999px}

/* Load row (kept for landscape) */
.load-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px}
.load-card{
  background:var(--bg);border:1px solid var(--border);border-radius:14px;
  padding:12px 10px;text-align:center;box-shadow:var(--shadow);
}
.load-lbl{font-size:0.55rem;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:var(--text2);margin-bottom:4px}
.load-val{font-size:1.45rem;font-weight:700;font-family:'SF Mono','DM Mono',monospace;line-height:1}
.load-sub{font-size:0.62rem;color:var(--text2);margin-top:2px}
/* Full-width load cards with sparkline */
.load-card-full{
  background:var(--bg);border:1px solid var(--border);border-radius:16px;
  padding:14px 16px;margin-bottom:10px;box-shadow:var(--shadow);
  display:flex;justify-content:space-between;align-items:center;gap:12px;
}
.lf-left{flex-shrink:0;min-width:100px}
.lf-right{flex:1;display:flex;justify-content:flex-end;align-items:center}

/* Goals */
.goals-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.goal-card{
  background:var(--bg);border:1px solid var(--border);border-radius:14px;
  padding:14px;text-align:center;box-shadow:var(--shadow);
}
.goal-lbl{font-size:0.6rem;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:var(--text2);margin-bottom:8px}

/* Oura */
.oura-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.oura-card{
  background:var(--bg);border:1px solid var(--border);border-radius:14px;
  padding:14px 12px;box-shadow:var(--shadow);
}
.oura-lbl{font-size:0.6rem;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:var(--text2);margin-bottom:6px}
.oura-val{font-size:2rem;font-weight:700;font-family:'SF Mono','DM Mono',monospace;line-height:1}
.oura-sub{font-size:0.7rem;color:var(--text2);margin-top:4px}

/* Strength */
.str-card{
  background:var(--bg);border:1px solid var(--border);border-left:3px solid var(--purple);
  border-radius:14px;padding:14px;margin-bottom:10px;box-shadow:var(--shadow);
}
.str-lbl{font-size:0.6rem;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:var(--purple);margin-bottom:8px}
.str-row{display:flex;gap:18px;margin-bottom:10px}
.s-val{font-size:1.5rem;font-weight:700;font-family:'SF Mono','DM Mono',monospace;line-height:1}
.s-lab{font-size:0.65rem;color:var(--text2);margin-top:2px}
.ex-pills{display:flex;flex-wrap:wrap;gap:5px}
.ex-pill{background:#f5f0ff;color:var(--purple);font-size:0.68rem;font-weight:600;padding:3px 10px;border-radius:999px}

/* AI */
.ai-card{
  background:var(--bg);border:1px solid var(--border);border-left:3px solid var(--orange);
  border-radius:14px;padding:14px;margin-bottom:10px;box-shadow:var(--shadow);
}
.ai-lbl{font-size:0.6rem;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:var(--orange);margin-bottom:6px}
.ai-txt{font-size:0.83rem;line-height:1.65;color:#333}
.ai-card.focus{border-left-color:var(--purple)}
.ai-card.focus .ai-lbl{color:var(--purple)}

/* Metric grid */
.m-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.m-card{background:var(--bg);border:1px solid var(--border);border-radius:14px;padding:14px;box-shadow:var(--shadow)}
.m-lbl{font-size:0.6rem;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:var(--text2);margin-bottom:6px}
.m-val{font-size:1.8rem;font-weight:700;font-family:'SF Mono','DM Mono',monospace;line-height:1}
.m-sub{font-size:0.68rem;color:var(--text2);margin-top:4px}

/* Row list */
.row-list-item{
  display:flex;justify-content:space-between;align-items:center;
  padding:10px 0;border-bottom:1px solid var(--border);
  font-size:0.85rem;
}
.row-list-item:last-child{border-bottom:none}

/* Loading */
.loading{text-align:center;padding:60px 20px;color:var(--text2);font-size:0.9rem;line-height:1.8}
.spinner{
  width:30px;height:30px;border:3px solid var(--border);border-top-color:var(--orange);
  border-radius:50%;animation:spin 0.7s linear infinite;margin:0 auto 14px;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* Toast */
.toast{
  position:fixed;bottom:92px;left:50%;transform:translateX(-50%) translateY(8px);
  background:#1a1a1a;color:#fff;border-radius:10px;padding:10px 18px;
  font-size:0.82rem;font-weight:500;opacity:0;transition:all 0.25s;
  white-space:nowrap;z-index:999;pointer-events:none;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── Landscape orientation ─────────────────────────────────────────────── */
@media (orientation: landscape) and (max-height: 500px) {
  body {
    max-width: 100%;
    padding-bottom: 0;
    padding-right: 72px; /* space for side nav */
  }

  /* Side nav instead of bottom nav */
  .nav {
    position: fixed;
    left: auto; right: 0; bottom: 0; top: 0;
    transform: none;
    width: 64px; max-width: 64px;
    height: 100%;
    flex-direction: column;
    grid-template-columns: 1fr;
    grid-template-rows: repeat(4, 1fr);
    border-top: none;
    border-left: 1px solid var(--border);
    padding: 20px 0;
  }
  .nav-btn { font-size: 0.55rem; padding: 10px 4px; }
  .nav-icon { font-size: 1.4rem; }

  /* Header compact */
  .hdr { padding: 12px 16px; position: relative; }

  /* Two-column layout for main content */
  .oura-grid    { grid-template-columns: repeat(4, 1fr); }
  .m-grid       { grid-template-columns: repeat(4, 1fr); }
  .goals-row    { grid-template-columns: repeat(4, 1fr); }
  .load-row     { grid-template-columns: repeat(3, 1fr); }

  /* Map taller in landscape */
  #actMap { height: 280px; }

  /* Wider sparklines */
  .oura-card, .m-card { min-width: 0; }
}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-row">
    <div>
      <div class="hdr-title">🔥 Training</div>
      <div class="hdr-sub" id="hdrSub">Loading...</div>
    </div>
    <div style="display:flex;gap:8px;align-items:center">
      <div style="font-size:0.7rem;color:var(--text2)" id="hdrDate"></div>
      <button id="darkBtn" onclick="toggleDark()" style="background:var(--bg2);color:var(--text);border:1px solid var(--border);border-radius:10px;padding:7px 10px;font-size:1rem;cursor:pointer;-webkit-appearance:none">🌙</button>
      <button onclick="hardRefresh()" style="background:var(--bg2);color:var(--text);border:1px solid var(--border);border-radius:10px;padding:7px 10px;font-size:0.85rem;cursor:pointer;-webkit-appearance:none" title="Reload data">↺</button>
      <button class="sync-btn" onclick="window.open('https://komootti.github.io/strava-dashboard/sync_trigger.html')">Sync ↗</button>
    </div>
  </div>
</div>

<div id="tabToday"    class="tab active"><div class="loading"><div class="spinner"></div>Loading your training...</div></div>
<div id="tabRecovery" class="tab"><div class="loading"><div class="spinner"></div>Loading recovery...</div></div>
<div id="tabStrength" class="tab"><div class="loading"><div class="spinner"></div>Loading strength...</div></div>
<div id="tabStats"    class="tab"><div class="loading"><div class="spinner"></div>Loading stats...</div></div>

<nav class="nav">
  <button class="nav-btn active" id="nav0" onclick="goTab(0)"><span class="nav-icon">🏃</span>Today</button>
  <button class="nav-btn"        id="nav1" onclick="goTab(1)"><span class="nav-icon">💍</span>Recovery</button>
  <button class="nav-btn"        id="nav2" onclick="goTab(2)"><span class="nav-icon">🏋️</span>Strength</button>
  <button class="nav-btn"        id="nav3" onclick="goTab(3)"><span class="nav-icon">📊</span>Stats</button>
</nav>

<div class="toast" id="toast"></div>

<script>
// ── Constants ─────────────────────────────────────────────────────────────────
const RAW = 'https://raw.githubusercontent.com/komootti/strava-dashboard/main';
const BUST = `?t=${Date.now()}`; // cache-bust every load

// Register service worker
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register(
    'https://komootti.github.io/strava-dashboard/sw.js'
  ).catch(()=>{});
}

// ── Tab navigation ────────────────────────────────────────────────────────────
const TABS = ['tabToday','tabRecovery','tabStrength','tabStats'];

// Hard refresh — clears all caches and reloads data
async function hardRefresh() {
  toast('🔄 Reloading...');
  // Unregister service workers
  if('serviceWorker' in navigator) {
    const regs = await navigator.serviceWorker.getRegistrations();
    await Promise.all(regs.map(r => r.unregister()));
  }
  // Clear all caches
  if('caches' in window) {
    const keys = await caches.keys();
    await Promise.all(keys.map(k => caches.delete(k)));
  }
  // Reload with cache bypass
  window.location.reload(true);
}

// Dark mode
function toggleDark() {
  const isDark = document.body.classList.toggle('dark');
  document.getElementById('darkBtn').textContent = isDark ? '☀️' : '🌙';
  localStorage.setItem('darkMode', isDark ? '1' : '0');
}
if(localStorage.getItem('darkMode')==='1') {
  document.body.classList.add('dark');
  document.addEventListener('DOMContentLoaded', ()=>{
    const b=document.getElementById('darkBtn'); if(b) b.textContent='☀️';
  });
}
let _curTab = 0;
function goTab(i) {
  TABS.forEach((t,j) => {
    document.getElementById(t).classList.toggle('active', j===i);
    document.getElementById('nav'+j).classList.toggle('active', j===i);
  });
  _curTab = i;
  if(i===0 && _map && _mapPending) { setTimeout(()=>_map.invalidateSize(),200); _mapPending=false; }
}

// ── Toast ─────────────────────────────────────────────────────────────────────
function toast(msg, dur=2500) {
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), dur);
}

// ── Formatters ────────────────────────────────────────────────────────────────
function fmtTime(mins) {
  if(!mins || isNaN(mins)) return '—';
  const h=Math.floor(mins/60), m=Math.round(mins%60);
  return h>0 ? `${h}h ${String(m).padStart(2,'0')}m` : `${m}m`;
}
function fmtDate(d) {
  return new Date(d).toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short',year:'numeric'});
}
function fmtShort(d) {
  return new Date(d).toLocaleDateString('en-GB',{day:'numeric',month:'short'});
}
function scol(v,hi=85,lo=70){ return v==null?'var(--text2)':v>=hi?'var(--green)':v>=lo?'var(--amber)':'var(--red)'; }
function hrvCol(v){ return v==null?'var(--text2)':v>=40?'var(--green)':v>=35?'var(--amber)':'var(--red)'; }
function rhrCol(v){ return v==null?'var(--text2)':v<=50?'var(--green)':v<=55?'var(--amber)':'var(--red)'; }

// ── Decode Google polyline ────────────────────────────────────────────────────
function decodePoly(enc) {
  let i=0, lat=0, lng=0, res=[];
  while(i<enc.length){
    let b, shift=0, result=0;
    do{ b=enc.charCodeAt(i++)-63; result|=(b&31)<<shift; shift+=5; }while(b>=32);
    lat+=(result&1)?~(result>>1):(result>>1);
    shift=result=0;
    do{ b=enc.charCodeAt(i++)-63; result|=(b&31)<<shift; shift+=5; }while(b>=32);
    lng+=(result&1)?~(result>>1):(result>>1);
    res.push([lat/1e5,lng/1e5]);
  }
  return res;
}

// ── Sparkline SVG ─────────────────────────────────────────────────────────────
function spark(vals, color, w=140, h=60) {
  const v=vals.filter(x=>x!=null&&!isNaN(x));
  if(v.length<2) return '';
  const mn=Math.min(...v), mx=Math.max(...v), rng=mx-mn||1;
  const pt=18, pb=5;
  const pts=v.map((val,i)=>({
    x:+((i/(v.length-1))*w).toFixed(1),
    y:+(pt+(1-(val-mn)/rng)*(h-pt-pb)).toFixed(1),
    v:val
  }));
  let path=`M${pts[0].x},${pts[0].y}`;
  for(let i=1;i<pts.length;i++){
    const cx=(pts[i-1].x+pts[i].x)/2;
    path+=` C${cx},${pts[i-1].y} ${cx},${pts[i].y} ${pts[i].x},${pts[i].y}`;
  }
  let area=`M0,${h} L${pts[0].x},${pts[0].y}`;
  for(let i=1;i<pts.length;i++){
    const cx=(pts[i-1].x+pts[i].x)/2;
    area+=` C${cx},${pts[i-1].y} ${cx},${pts[i].y} ${pts[i].x},${pts[i].y}`;
  }
  area+=` L${pts[pts.length-1].x},${h} Z`;
  const hx=color.replace('#','');
  const r=parseInt(hx.slice(0,2),16),g=parseInt(hx.slice(2,4),16),b2=parseInt(hx.slice(4,6),16);
  const dots=pts.map(p=>`<circle cx="${p.x}" cy="${p.y}" r="2.5" fill="#fff" stroke="${color}" stroke-width="1.5"/>`).join('');
  const lbls=pts.map(p=>`<text x="${p.x}" y="${Math.max(p.y-5,13)}" text-anchor="middle" fill="${color}" font-size="8" font-weight="400" font-family="SF Mono,DM Mono,monospace">${Math.round(p.v)}</text>`).join('');
  const last=pts[pts.length-1];
  return `<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}" xmlns="http://www.w3.org/2000/svg" style="display:block">
    <path d="${area}" fill="rgba(${r},${g},${b2},0.08)"/>
    <path d="${path}" fill="none" stroke="${color}" stroke-width="1.8" stroke-linecap="round"/>
    ${lbls}${dots}
    <circle cx="${last.x}" cy="${last.y}" r="3.5" fill="${color}"/>
  </svg>`;
}

// ── Goal ring ─────────────────────────────────────────────────────────────────
function ring(pct, cur, target, unit, color) {
  const R=50, circ=2*Math.PI*R;
  const dash=circ*Math.min(pct,100)/100, gap=circ-dash;
  const offset=(circ*0.25).toFixed(1);
  return `<svg width="120" height="120" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
    <circle cx="60" cy="60" r="${R}" fill="none" stroke="#f0f0f0" stroke-width="8"/>
    <circle cx="60" cy="60" r="${R}" fill="none" stroke="${color}" stroke-width="8"
      stroke-dasharray="${dash.toFixed(1)} ${gap.toFixed(1)}"
      stroke-dashoffset="${offset}" stroke-linecap="round"/>
    <text x="60" y="55" text-anchor="middle" fill="#1a1a1a" font-size="18" font-weight="700" font-family="SF Mono,DM Mono,monospace">${Math.round(cur)}</text>
    <text x="60" y="69" text-anchor="middle" fill="#999" font-size="9" font-family="-apple-system,sans-serif">${unit} / ${target}</text>
    <text x="60" y="84" text-anchor="middle" fill="${color}" font-size="11" font-weight="700" font-family="-apple-system,sans-serif">${Math.round(pct)}%</text>
  </svg>`;
}

// ── Effort pill ────────────────────────────────────────────────────────────────
function effortPill(e) {
  if(!e||e<=0) return '';
  const [lbl,col]=e<30?['Easy','#22c55e']:e<70?['Moderate','#f59e0b']:e<120?['Hard','#f97316']:['Max','#ef4444'];
  return `<span class="effort-pill" style="background:${col}22;color:${col}">${lbl}</span>`;
}

// ── Data ──────────────────────────────────────────────────────────────────────
let _acts=[], _oura=[], _poly={}, _fitbod=null, _map=null, _mapPending=false;

function parseCSV(txt) {
  const lines=txt.trim().split('\n');
  const heads=lines[0].split(',').map(h=>h.replace(/"/g,'').trim());
  return lines.slice(1).map(line=>{
    const vals=[]; let cur='', inQ=false;
    for(let c of line){
      if(c==='"'){inQ=!inQ;}
      else if(c===','&&!inQ){vals.push(cur);cur='';}
      else cur+=c;
    }
    vals.push(cur);
    const o={};
    heads.forEach((h,i)=>{ o[h]=(vals[i]||'').trim(); });
    o._date  = new Date(o['Activity Date']);
    o._sport = o['Activity Type'];
    o._name  = o['Activity Name'];
    o._id    = o['Activity ID'];
    o._mins  = parseFloat(o['Moving Time']||0)/60;
    o._hr    = parseFloat(o['Average Heart Rate']||0)||null;
    o._speed = parseFloat(o['Average Speed']||0)*3.6;
    o._effort= parseFloat(o['Relative Effort']||0)||0;
    // Only count distance + elevation for endurance sports
    // Weight Training, Workout etc record steps/other data in Distance.1 — exclude
    const ENDURANCE = new Set(['Run','Ride','Virtual Ride','Virtual Run',
      'Walk','Hike','Nordic Ski','Swim','Rowing','E-Bike Ride',
      'Ice Skate','Kayaking','Stand Up Paddling']);
    const isEnd = ENDURANCE.has(o._sport);
    o._dist  = isEnd ? parseFloat(o['Distance.1']||0)/1000 : 0;
    o._elev  = isEnd ? parseFloat(o['Elevation Gain']||0)  : 0;
    o._isEnd = isEnd;
    return o;
  }).filter(a=>a._date&&!isNaN(a._date)).sort((a,b)=>b._date-a._date);
}

// ── Load everything ───────────────────────────────────────────────────────────
async function loadAll() {
  toast('🔄 Fetching latest data...');
  const NO_CACHE = {cache: 'no-store'};
  const [aR,oR,pR,fR] = await Promise.allSettled([
    fetch(`${RAW}/activities.csv${BUST}`,    NO_CACHE).then(r=>r.text()),
    fetch(`${RAW}/oura_data.json${BUST}`,    NO_CACHE).then(r=>r.json()),
    fetch(`${RAW}/polylines.json${BUST}`,    NO_CACHE).then(r=>r.json()),
    fetch(`${RAW}/fitbod_data.json${BUST}`,  NO_CACHE).then(r=>r.json()),
  ]);
  if(aR.status==='fulfilled') _acts=parseCSV(aR.value);
  if(oR.status==='fulfilled') _oura=oR.value;
  if(pR.status==='fulfilled') _poly=pR.value;
  if(fR.status==='fulfilled') _fitbod=fR.value;

  document.getElementById('hdrSub').textContent=
    `${_acts.length.toLocaleString()} activities`;

  renderToday();
  renderRecovery();
  renderStrength();
  renderStats();
  toast('✅ Loaded');
}

// ── TODAY ─────────────────────────────────────────────────────────────────────
function renderToday() {
  const act = _acts[0];
  if(!act){ document.getElementById('tabToday').innerHTML='<div class="loading">No activities found.</div>'; return; }

  // Speed / pace
  let speedStr='';
  if(['Ride','Virtual Ride','E-Bike Ride'].includes(act._sport)&&act._speed>0)
    speedStr=`${act._speed.toFixed(1)} km/h`;
  else if(act._dist>0&&act._mins>0){
    const p=act._mins/act._dist;
    speedStr=`${Math.floor(p)}:${String(Math.round((p%1)*60)).padStart(2,'0')} /km`;
  }
  const statParts=[
    act._dist>0?`${act._dist.toFixed(1)} km`:null,
    act._mins>0?fmtTime(act._mins):null,
    speedStr||null,
    act._elev>10?`${Math.round(act._elev)} m↑`:null,
    act._hr?`${Math.round(act._hr)} bpm avg`:null,
  ].filter(Boolean).join(' · ');

  // CTL/ATL/TSB
  const sorted=[..._acts].reverse();
  let ctl=0,atl=0;
  const ctlHist=[], atlHist=[], tsbHist=[];
  sorted.forEach(a=>{
    const tss=a._effort>0?a._effort:a._mins*Math.pow((a._hr||130)/150,2)*0.5;
    ctl=ctl+(tss-ctl)*(1-Math.exp(-1/42));
    atl=atl+(tss-atl)*(1-Math.exp(-1/7));
    ctlHist.push(+ctl.toFixed(1));
    atlHist.push(+atl.toFixed(1));
    tsbHist.push(+(ctl-atl).toFixed(1));
  });
  const tsb=ctl-atl;
  const ctl7=ctlHist.slice(-7), atl7=atlHist.slice(-7), tsb7=tsbHist.slice(-7);
  const [tsbCol,tsbLbl]=tsb>15?['var(--green)','Peaked']:tsb>5?['var(--green)','Fresh']:tsb>-10?['var(--amber)','Training']:tsb>-20?['orange','Tired']:['var(--red)','Overloaded'];

  // Oura
  const o=_oura[0]||{};
  const w7=[..._oura].slice(0,7).reverse();
  const readyV=w7.map(d=>d.readiness_score);
  const hrvV=w7.map(d=>d.hrv_avg);
  const sleepV=w7.map(d=>d.sleep_score);

  // Weekly hours last 8w — matches desktop ENDURANCE_H (includes Weight Training/Workout)
  const ENDURANCE_H=new Set(['Run','Ride','Virtual Ride','Virtual Run','Walk','Hike',
    'Nordic Ski','Swim','Rowing','E-Bike Ride','Weight Training','Workout','Crossfit']);
  const endActsT=_acts.filter(a=>ENDURANCE_H.has(a._sport));
  const w8c=new Date(Date.now()-56*864e5);
  const wMap={};
  endActsT.filter(a=>a._date>=w8c).forEach(a=>{
    const wk=new Date(a._date);
    wk.setDate(wk.getDate()-((wk.getDay()+6)%7));
    const k=wk.toISOString().slice(0,10);
    wMap[k]=(wMap[k]||0)+a._mins/60;
  });
  const wKeys=Object.keys(wMap).sort();
  const wVals=wKeys.map(k=>wMap[k]);
  const wLabels=wKeys.map(k=>{const d=new Date(k);return `${d.getDate()} ${['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][d.getMonth()]}`;});
  const thisWkH=wVals.length?wVals[wVals.length-1]:0;

  const polyStr=_poly[act._id]||'';
  const hasMap=polyStr.length>5;

  // AI from sessionStorage
  const aiRaw=sessionStorage.getItem(`ai_${act._id}`)||'';
  const aiParts=aiRaw?aiRaw.split('\n\n').filter(Boolean):[];

  let html=`
  <div class="sec">
    <div class="sec-title">Latest Activity</div>
    <div class="card">
      <div class="card-body">
        <div class="act-sport-row">
          <span class="sport-pill">${act._sport}</span>

      <div class="act-footer">
        ${effortPill(act._effort)}
        <a href="https://www.strava.com/activities/${act._id}" target="_blank">View on Strava ↗</a>
      </div>
    </div>
  </div>`;

  // Fitbod fallback if no GPS
  if(_fitbod && !hasMap) {
    const sess=(_fitbod.sessions||[])[0];
    const fsets=(_fitbod.sets||[]).filter(s=>s.date===sess?.date);
    if(sess){
      const exPills=fsets.slice(0,5).map(s=>`<span class="ex-pill">${s.exercise.length>24?s.exercise.slice(0,24)+'…':s.exercise}</span>`).join('');
      html+=`<div class="sec">
      <div class="str-card">
        <div class="str-lbl">🏋️ Last Strength · ${fmtDate(sess.date)}</div>
        <div class="str-row">
          <div><div class="s-val">${(sess.total_volume/1000).toFixed(1)}t</div><div class="s-lab">volume</div></div>

          <div><div class="s-val">${sess.exercises}</div><div class="s-lab">exercises</div></div>
        </div>
        <div class="ex-pills">${exPills}</div>
      </div></div>`;
    }
  }

  // ── Training Load — full-width cards with 7-day sparklines ──
  html+=`<div class="sec">
    <div class="sec-title">Training Load</div>
    <div class="load-card-full">
      <div class="lf-left">
        <div class="load-lbl">CTL · Fitness</div>

      </div>
      <div class="lf-right">${spark(ctl7,'#fc4c02',180,64)}</div>
    </div>
    <div class="load-card-full">
      <div class="lf-left">
        <div class="load-lbl">ATL · Fatigue</div>

        <div class="load-sub">7-day load</div>
      </div>
      <div class="lf-right">${spark(atl7,'#f59e0b',180,64)}</div>
    </div>
    <div class="load-card-full">
      <div class="lf-left">
        <div class="load-lbl">TSB · Form</div>
        <div class="load-val" style="color:${tsbCol}">${tsb>=0?'+':''}${tsb.toFixed(1)}</div>
        <div class="load-sub" style="color:${tsbCol};font-weight:600">${tsbLbl}</div>
      </div>
      <div class="lf-right">${spark(tsb7,'#a78bfa',180,64)}</div>
    </div>
  </div>`;

  // ── Recovery (Readiness, HRV, Sleep) ──
  if(o.readiness_score||o.hrv_avg||o.sleep_score) {
    const totalMins=o.total_sleep_min||0;
    const sleepH=totalMins?`${Math.floor(totalMins/60)}h ${String(Math.round(totalMins%60)).padStart(2,'0')}m`:'—';
    html+=`<div class="sec">
    <div class="sec-title">Recovery</div>
    <div class="oura-grid" style="grid-template-columns:1fr 1fr 1fr">
      <div class="oura-card">
        <div class="oura-lbl">Readiness</div>
        <div class="oura-val" style="color:${scol(o.readiness_score)}">${o.readiness_score?Math.round(o.readiness_score):'—'}</div>

        <div style="margin-top:6px">${spark(readyV,scol(o.readiness_score).replace(/var\(--(\w+)\)/g,(_,n)=>({green:'#22c55e',amber:'#f59e0b',red:'#ef4444',text2:'#888'})[n]||'#888'),120,48)}</div>
      </div>
      <div class="oura-card">
        <div class="oura-lbl">HRV</div>

      </div>
      <div class="oura-card">
        <div class="oura-lbl">Sleep</div>
        <div class="oura-val" style="color:${scol(o.sleep_score)}">${o.sleep_score?Math.round(o.sleep_score):'—'}</div>
        <div class="oura-sub">${sleepH}</div>
        <div style="margin-top:6px">${spark(sleepV,scol(o.sleep_score).replace(/var\(--(\w+)\)/g,(_,n)=>({green:'#22c55e',amber:'#f59e0b',red:'#ef4444',text2:'#888'})[n]||'#888'),120,48)}</div>
      </div>
    </div>
  </div>`;
  }

  // ── Weekly Hours ──
  if(wVals.length>1) {
    html+=`<div class="sec">
    <div class="sec-title">Weekly Hours</div>
    <div class="card" style="padding:14px">
      <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px">

        </div>
        <span style="font-size:0.72rem;color:var(--text2)">last 8 weeks</span>
      </div>
      ${spark(wVals,'#a78bfa',window.innerWidth>420?380:320,64)}
    </div>
  </div>`;
  }

  // ── AI Intelligence ──
  if(aiParts.length>=1) {
    html+=`<div class="sec">
    <div class="sec-title">AI Intelligence</div>
    ${aiParts[0]?`<div class="ai-card"><div class="ai-lbl">✦ Activity Analysis</div><div class="ai-txt">${aiParts[0]}</div></div>`:''}
    ${aiParts[1]?`<div class="ai-card focus"><div class="ai-lbl">▶ Next Session</div><div class="ai-txt">${aiParts[1]}</div></div>`:''}

  // Render map

      const coords=decodePoly(polyStr);
      if(coords.length<2) return;
      const lats=coords.map(c=>c[0]),lngs=coords.map(c=>c[1]);
      const bounds=[[Math.min(...lats),Math.min(...lngs)],[Math.max(...lats),Math.max(...lngs)]];
      if(_map){_map.remove();_map=null;}
      _map=L.map('actMap',{zoomControl:false,attributionControl:false,dragging:true,scrollWheelZoom:false});

      _map.fitBounds(bounds,{padding:[20,20]});
      L.polyline(coords,{color:'#fc4c02',weight:4,opacity:0.9,lineCap:'round',lineJoin:'round'}).addTo(_map);
      L.circleMarker(coords[0],{radius:7,color:'#fff',fillColor:'#22c55e',fillOpacity:1,weight:2.5}).addTo(_map);

}

// ── STATS ─────────────────────────────────────────────────────────────────────
function renderStats() {
  // Endurance only for distance/elevation/hours — matches desktop exactly
  const endActs=_acts.filter(a=>a._isEnd);
  const totalKm=endActs.reduce((s,a)=>s+a._dist,0);
  const totalH=endActs.reduce((s,a)=>s+a._mins,0)/60;
  const totalElev=endActs.reduce((s,a)=>s+a._elev,0);
  const yr26=endActs.filter(a=>a._date.getFullYear()===2026);
  const runKm26=yr26.filter(a=>a._sport==='Run').reduce((s,a)=>s+a._dist,0);
  const rideKm26=yr26.filter(a=>['Ride','Virtual Ride','E-Bike Ride'].includes(a._sport)).reduce((s,a)=>s+a._dist,0);
  // Sport counts from all activities (including strength)
  const sports={};
  _acts.forEach(a=>{sports[a._sport]=(sports[a._sport]||0)+1;});
  const topS=Object.entries(sports).sort((a,b)=>b[1]-a[1]).slice(0,6);

  // Weekly hours last 8w — matches desktop (includes strength)
  const ENDURANCE_H_S=new Set(['Run','Ride','Virtual Ride','Virtual Run','Walk','Hike',
    'Nordic Ski','Swim','Rowing','E-Bike Ride','Weight Training','Workout','Crossfit']);
  const w8c=new Date(Date.now()-56*864e5);
  const wMap={};
  _acts.filter(a=>a._date>=w8c&&ENDURANCE_H_S.has(a._sport)).forEach(a=>{
    const wk=new Date(a._date);
    wk.setDate(wk.getDate()-((wk.getDay()+6)%7)); // Monday-based week
    const k=wk.toISOString().slice(0,10);
    wMap[k]=(wMap[k]||0)+a._mins/60;
  });
  const wKeys=Object.keys(wMap).sort();
  const wVals=wKeys.map(k=>wMap[k]);

  document.getElementById('tabStats').innerHTML=`
  <div class="sec">
    <div class="sec-title">All-Time</div>
    <div class="m-grid">
      <div class="m-card"><div class="m-lbl">Activities</div><div class="m-val">${_acts.length.toLocaleString()}</div></div>
      <div class="m-card"><div class="m-lbl">Distance</div><div class="m-val" style="font-size:1.5rem">${(totalKm/1000).toFixed(1)}<span style="font-size:0.85rem;color:var(--text2)">k km</span></div></div>
      <div class="m-card"><div class="m-lbl">Hours</div><div class="m-val" style="font-size:1.5rem">${Math.round(totalH).toLocaleString()}<span style="font-size:0.85rem;color:var(--text2)">h</span></div></div>
      <div class="m-card"><div class="m-lbl">Elevation</div><div class="m-val" style="font-size:1.5rem">${(totalElev/1000).toFixed(0)}<span style="font-size:0.85rem;color:var(--text2)">k m</span></div></div>
    </div>
  </div>
  <div class="sec">
    <div class="sec-title">2026 Progress</div>
    <div class="goals-row">
      <div class="goal-card"><div class="goal-lbl">🏃 Running</div>${ring(runKm26/800*100,runKm26,800,'km','#fc4c02')}</div>
      <div class="goal-card"><div class="goal-lbl">🚴 Cycling</div>${ring(rideKm26/3000*100,rideKm26,3000,'km','#f59e0b')}</div>
    </div>
  </div>
  <div class="sec">
    <div class="sec-title">Weekly Hours (last 8 weeks)</div>
    <div class="m-card" style="margin-bottom:12px;padding:14px">
      ${spark(wVals,'#a78bfa',300,64)}
    </div>
  </div>
  <div class="sec">
    <div class="sec-title">Sports</div>
    ${topS.map(([s,n])=>`<div class="row-list-item"><span style="font-weight:500">${s}</span><span style="font-weight:700;color:var(--orange)">${n.toLocaleString()}</span></div>`).join('')}
  </div>
  <div style="height:8px"></div>`;
}

// ── Boot ──────────────────────────────────────────────────────────────────────
// Force reload when new version deployed — fixes iOS PWA caching
(function() {
  const CURRENT_VERSION = 'v6';
  const stored = localStorage.getItem('appVersion');
  if (stored !== CURRENT_VERSION) {
    localStorage.setItem('appVersion', CURRENT_VERSION);
    if ('caches' in window) {
      caches.keys().then(ks => Promise.all(ks.map(k => caches.delete(k))));
    }
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations()
        .then(rs => rs.forEach(r => r.unregister()));
    }
    if (!sessionStorage.getItem('reloaded_v6')) {
      sessionStorage.setItem('reloaded_v6', '1');
      window.location.href = window.location.href.split('?')[0] + '?v=' + Date.now();
      throw new Error('reloading');
    }
  }
})();

// Orientation change — invalidate map if visible
window.addEventListener('orientationchange', () => {
  setTimeout(() => {
    if(_map) { _map.invalidateSize(); }
  }, 300);
});
window.addEventListener('resize', () => {
  setTimeout(() => {
    if(_map) { _map.invalidateSize(); }
  }, 200);
});

document.getElementById('hdrDate').textContent=
  new Date().toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short'});
loadAll().catch(e=>{
  document.getElementById('tabToday').innerHTML=`<div class="loading">Failed to load.<br><small>${e.message}</small></div>`;
});
</script>
</body>
</html>

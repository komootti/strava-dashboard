<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Sync Training">
<title>Sync Training</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body {
    background:#0f0f0f; font-family:-apple-system,'SF Pro Display',sans-serif;
    min-height:100vh; display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    padding:2rem 1.5rem; color:#e8e4de;
  }
  .logo { font-size:2.5rem; margin-bottom:0.5rem; }
  h1 { font-size:1.3rem; font-weight:700; letter-spacing:-0.02em; margin-bottom:0.3rem; color:#f0ede8; }
  .subtitle { font-size:0.8rem; color:#555; margin-bottom:2rem; text-align:center; }

  .token-section {
    width:100%; max-width:320px; background:#1a1a1a;
    border:1px solid #2a2a2a; border-radius:14px;
    padding:1rem 1.2rem; margin-bottom:1.2rem;
  }
  .token-label {
    font-size:0.62rem; color:#888; font-weight:600;
    text-transform:uppercase; letter-spacing:0.1em; margin-bottom:8px;
  }
  .token-row { display:flex; gap:8px; align-items:center; }
  .token-input {
    flex:1; background:#111; border:1px solid #333; border-radius:8px;
    padding:8px 10px; color:#e8e4de; font-size:0.8rem;
    font-family:-apple-system,sans-serif; outline:none;
  }
  .token-input:focus { border-color:#fc4c02; }
  .token-save {
    background:#fc4c02; color:#fff; border:none; border-radius:8px;
    padding:8px 14px; font-size:0.8rem; font-weight:600; cursor:pointer;
    white-space:nowrap;
  }
  .token-status { font-size:0.7rem; margin-top:6px; color:#555; }
  .token-status.ok { color:#50c850; }

  .btn {
    width:100%; max-width:320px; padding:1.1rem 1.5rem;
    border-radius:14px; border:none; font-size:1rem; font-weight:600;
    cursor:pointer; display:flex; align-items:center; gap:14px;
    margin-bottom:12px; transition:transform 0.12s, opacity 0.12s;
    -webkit-appearance:none; position:relative; overflow:hidden;
  }
  .btn:active { transform:scale(0.97); opacity:0.85; }
  .btn:disabled { opacity:0.4; cursor:not-allowed; }
  .btn-primary { background:#fc4c02; color:#fff; }
  .btn-secondary { background:#1a1a1a; color:#e8e4de; border:1px solid #2a2a2a; }
  .btn-icon { font-size:1.4rem; flex-shrink:0; }
  .btn-text { text-align:left; }
  .btn-label { font-size:1rem; font-weight:600; line-height:1.2; }
  .btn-desc { font-size:0.72rem; opacity:0.7; font-weight:400; margin-top:2px; }
  .spinner {
    display:none; position:absolute; right:1.2rem; top:50%;
    transform:translateY(-50%); width:20px; height:20px;
    border:2px solid rgba(255,255,255,0.3); border-top-color:#fff;
    border-radius:50%; animation:spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform:translateY(-50%) rotate(360deg); } }

  .divider {
    width:100%; max-width:320px; display:flex; align-items:center;
    gap:10px; margin:4px 0 16px; color:#333; font-size:0.72rem;
  }
  .divider::before,.divider::after { content:''; flex:1; height:1px; background:#222; }

  .status-row { width:100%; max-width:320px; display:flex; justify-content:space-between; margin-top:1.5rem; gap:10px; }
  .status-card { flex:1; background:#1a1a1a; border:1px solid #222; border-radius:10px; padding:0.75rem; text-align:center; }
  .s-label { font-size:0.6rem; color:#555; text-transform:uppercase; letter-spacing:0.08em; margin-bottom:4px; }
  .s-val { font-size:0.78rem; font-weight:600; color:#888; }

  .toast {
    position:fixed; bottom:2.5rem; left:50%;
    transform:translateX(-50%) translateY(20px);
    background:#1e1e1e; border:1px solid #333; border-radius:12px;
    padding:0.9rem 1.4rem; font-size:0.85rem; font-weight:500;
    white-space:nowrap; opacity:0; transition:all 0.3s ease;
    z-index:999; max-width:90vw; text-align:center;
  }
  .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
  .toast.success { border-color:#50c850; color:#50c850; }
  .toast.error   { border-color:#ff5555; color:#ff5555; }
  .toast.info    { border-color:#fc4c02; color:#fc4c02; }
</style>
</head>
<body>

<div class="logo">🔥</div>
<h1>Training Sync</h1>
<p class="subtitle">komootti · Strava Dashboard</p>

<div class="token-section">
  <div class="token-label">🔑 GitHub Token (stored locally)</div>
  <div class="token-row">
    <input type="password" class="token-input" id="tokenInput"
           placeholder="ghp_xxxxxxxxxxxx" autocomplete="off" autocorrect="off"
           autocapitalize="off" spellcheck="false">
    <button class="token-save" onclick="saveToken()">Save</button>
  </div>
  <div class="token-status" id="tokenStatus">Enter your GitHub token once — saved in this browser only</div>
</div>

<button class="btn btn-primary" id="btnData" onclick="trigger('data')">
  <span class="btn-icon">⚡</span>
  <span class="btn-text">
    <div class="btn-label">Sync Activity Data</div>
    <div class="btn-desc">Fetch latest Strava activities</div>
  </span>
  <div class="spinner" id="spinData"></div>
</button>

<button class="btn btn-secondary" id="btnMaps" onclick="trigger('maps')">
  <span class="btn-icon">🗺️</span>
  <span class="btn-text">
    <div class="btn-label">Sync Route Maps</div>
    <div class="btn-desc">Fetch GPS polylines</div>
  </span>
  <div class="spinner" id="spinMaps"></div>
</button>

<div class="divider">or</div>

<button class="btn btn-secondary" id="btnBoth" onclick="triggerBoth()">
  <span class="btn-icon">🔄</span>
  <span class="btn-text">
    <div class="btn-label">Sync Everything</div>
    <div class="btn-desc">Data + maps in sequence</div>
  </span>
  <div class="spinner" id="spinBoth"></div>
</button>

<div class="status-row">
  <div class="status-card">
    <div class="s-label">Last sync</div>
    <div class="s-val" id="lastSync">—</div>
  </div>
  <div class="status-card">
    <div class="s-label">Dashboard</div>
    <div class="s-val">
      <a href="https://strava-dashboard-ybm6tua9pghphw56juqitq.streamlit.app/" target="_blank"
         style="color:#fc4c02;text-decoration:none">Open ↗</a>
    </div>
  </div>
</div>

<div id="toast" class="toast"></div>

<script>
const REPO          = "komootti/strava-dashboard";
const WORKFLOW_DATA = "sync.yml";
const WORKFLOW_MAPS = "polylines_sync.yml";

function getToken() { return localStorage.getItem("gh_sync_token") || ""; }

function saveToken() {
  const val = document.getElementById("tokenInput").value.trim();
  if (!val) { showToast("⚠️ Enter a token first", "error"); return; }
  localStorage.setItem("gh_sync_token", val);
  document.getElementById("tokenInput").value = "";
  updateTokenStatus();
  showToast("✅ Token saved locally", "success");
}

function updateTokenStatus() {
  const t = getToken();
  const el = document.getElementById("tokenStatus");
  if (t) {
    el.textContent = "✓ Token saved — ends in ···" + t.slice(-4);
    el.className = "token-status ok";
  } else {
    el.textContent = "Enter your GitHub token once — saved in this browser only";
    el.className = "token-status";
  }
}

function showToast(msg, type="info", duration=3500) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.className = `toast ${type} show`;
  setTimeout(() => t.className = "toast", duration);
}

function setLoading(id, on) {
  document.getElementById("spin" + id).style.display = on ? "block" : "none";
  document.getElementById("btn"  + id).disabled = on;
}

async function dispatchWorkflow(workflow) {
  const token = getToken();
  if (!token) return false;
  const res = await fetch(
    `https://api.github.com/repos/${REPO}/actions/workflows/${workflow}/dispatches`,
    {
      method: "POST",
      headers: {
        "Authorization": `Bearer ${token}`,
        "Accept": "application/vnd.github.v3+json",
        "Content-Type": "application/json",
      },
      body: JSON.stringify({ ref: "main" })
    }
  );
  return res.status === 204;
}

async function trigger(type) {
  if (!getToken()) { showToast("⚠️ Save your GitHub token first", "error", 4000); return; }
  const id       = type === "data" ? "Data" : "Maps";
  const workflow = type === "data" ? WORKFLOW_DATA : WORKFLOW_MAPS;
  setLoading(id, true);
  showToast("⏳ Triggering sync...", "info", 2000);
  try {
    const ok = await dispatchWorkflow(workflow);
    if (ok) {
      const now = new Date().toLocaleTimeString([], {hour:"2-digit", minute:"2-digit"});
      document.getElementById("lastSync").textContent = now;
      localStorage.setItem("lastSync", now);
      showToast(type === "data" ? "✅ Syncing — ready in ~60s" : "✅ Maps syncing — ready in ~60s", "success");
    } else {
      showToast("❌ Failed — token may need 'workflow' scope", "error", 5000);
    }
  } catch(e) { showToast("❌ Network error", "error"); }
  setLoading(id, false);
}

async function triggerBoth() {
  if (!getToken()) { showToast("⚠️ Save your GitHub token first", "error", 4000); return; }
  setLoading("Both", true);
  showToast("⏳ Triggering both syncs...", "info", 2000);
  try {
    const ok1 = await dispatchWorkflow(WORKFLOW_DATA);
    await new Promise(r => setTimeout(r, 1500));
    const ok2 = await dispatchWorkflow(WORKFLOW_MAPS);
    if (ok1 && ok2) {
      const now = new Date().toLocaleTimeString([], {hour:"2-digit", minute:"2-digit"});
      document.getElementById("lastSync").textContent = now;
      localStorage.setItem("lastSync", now);
      showToast("✅ Both syncs started — ready in ~90s", "success");
    } else {
      showToast("⚠️ One or both syncs failed", "error");
    }
  } catch(e) { showToast("❌ Network error", "error"); }
  setLoading("Both", false);
}

// Init
updateTokenStatus();
const ls = localStorage.getItem("lastSync");
if (ls) document.getElementById("lastSync").textContent = ls;
</script>
</body>
</html>
